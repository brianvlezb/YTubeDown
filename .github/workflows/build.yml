      - name: Write Java sources
        run: |
          S=app/src/main/java/com/ytubedown
          cat > $S/VideoItem.java << 'JEOF'
          package com.ytubedown;
          public class VideoItem {
            public String id,title,channel,duration,thumbnailUrl,url;
            public VideoItem(String id,String title,String channel,String duration,String thumbnailUrl){
              this.id=id;this.title=title;this.channel=channel;
              this.duration=duration;this.thumbnailUrl=thumbnailUrl;
              this.url="https://www.youtube.com/watch?v="+id;
            }
          }
          JEOF

          cat > $S/Prefs.java << 'JEOF'
          package com.ytubedown;
          import android.content.Context;
          import android.content.SharedPreferences;
          public class Prefs {
            private static final String NAME="ytubedown_prefs";
            public static SharedPreferences get(Context c){return c.getSharedPreferences(NAME,Context.MODE_PRIVATE);}
            public static String getFormat(Context c){return get(c).getString("format","audio");}
            public static String getQuality(Context c){return get(c).getString("quality","320");}
            public static void save(Context c,String fmt,String q){
              get(c).edit().putString("format",fmt).putString("quality",q).apply();
            }
          }
          JEOF

          cat > $S/YouTubeSearch.java << 'JEOF'
          package com.ytubedown;
          import com.google.gson.*;
          import java.io.IOException;
          import java.util.*;
          import okhttp3.*;
          public class YouTubeSearch {
            private static final String API="https://pipedapi.kavin.rocks";
            private final OkHttpClient client=new OkHttpClient();
            public interface Callback{void onResults(List<VideoItem> i);void onError(String m);}
            public void search(String query,Callback cb){
              new Thread(()->{
                try{
                  String url=API+"/search?q="+java.net.URLEncoder.encode(query,"UTF-8")+"&filter=videos";
                  Request req=new Request.Builder().url(url).header("User-Agent","YTubeDown/1.0").build();
                  try(Response r=client.newCall(req).execute()){
                    if(!r.isSuccessful()){cb.onError("Error: "+r.code());return;}
                    cb.onResults(parse(r.body().string()));
                  }
                }catch(IOException e){cb.onError("Error: "+e.getMessage());}
              }).start();
            }
            private List<VideoItem> parse(String json){
              List<VideoItem> list=new ArrayList<>();
              try{
                JsonArray items=JsonParser.parseString(json).getAsJsonObject().getAsJsonArray("items");
                for(JsonElement el:items){
                  JsonObject o=el.getAsJsonObject();
                  if(!o.has("type")||!o.get("type").getAsString().equals("stream"))continue;
                  String id="";
                  if(o.has("url")){String u=o.get("url").getAsString();if(u.contains("v="))id=u.substring(u.indexOf("v=")+2);}
                  String title=o.has("title")?o.get("title").getAsString():"Sin titulo";
                  String ch=o.has("uploaderName")?o.get("uploaderName").getAsString():"";
                  String thumb=o.has("thumbnail")?o.get("thumbnail").getAsString():"";
                  int d=o.has("duration")?o.get("duration").getAsInt():0;
                  String dur=d>0?(d>=3600?String.format("%d:%02d:%02d",d/3600,(d%3600)/60,d%60):String.format("%d:%02d",d/60,d%60)):"";
                  if(!id.isEmpty())list.add(new VideoItem(id,title,ch,dur,thumb));
                  if(list.size()>=20)break;
                }
              }catch(Exception e){e.printStackTrace();}
              return list;
            }
          }
          JEOF

          cat > $S/VideoAdapter.java << 'JEOF'
          package com.ytubedown;
          import android.view.*;import android.widget.*;
          import androidx.annotation.NonNull;
          import androidx.recyclerview.widget.*;
          import com.bumptech.glide.Glide;
          import java.util.List;
          public class VideoAdapter extends RecyclerView.Adapter<VideoAdapter.VH>{
            public interface OnDownloadClick{void onClick(VideoItem i);}
            private final List<VideoItem> items;
            private final OnDownloadClick listener;
            public VideoAdapter(List<VideoItem> items,OnDownloadClick l){this.items=items;this.listener=l;}
            @NonNull @Override
            public VH onCreateViewHolder(@NonNull ViewGroup p,int t){
              return new VH(LayoutInflater.from(p.getContext()).inflate(R.layout.item_video,p,false));
            }
            @Override public void onBindViewHolder(@NonNull VH h,int pos){
              VideoItem it=items.get(pos);
              h.title.setText(it.title);h.channel.setText(it.channel);h.duration.setText(it.duration);
              Glide.with(h.thumbnail.getContext()).load(it.thumbnailUrl).centerCrop().into(h.thumbnail);
              h.btn.setOnClickListener(v->listener.onClick(it));
            }
            @Override public int getItemCount(){return items.size();}
            static class VH extends RecyclerView.ViewHolder{
              ImageView thumbnail;TextView title,channel,duration;ImageButton btn;
              VH(View v){super(v);thumbnail=v.findViewById(R.id.imgThumbnail);
                title=v.findViewById(R.id.tvTitle);channel=v.findViewById(R.id.tvChannel);
                duration=v.findViewById(R.id.tvDuration);btn=v.findViewById(R.id.btnDownload);}
            }
          }
          JEOF

          cat > $S/DownloadService.java << 'JEOF'
          package com.ytubedown;
          import android.app.*;import android.content.Intent;
          import android.os.*;import android.widget.Toast;
          import androidx.core.app.NotificationCompat;
          import com.yausername.youtubedl_android.*;
          import java.io.File;
          public class DownloadService extends Service{
            public static final String EXTRA_URL="url",EXTRA_TITLE="title";
            private static final String CH="dl_ch";
            @Override public int onStartCommand(Intent intent,int f,int id){
              String url=intent.getStringExtra(EXTRA_URL),title=intent.getStringExtra(EXTRA_TITLE);
              String fmt=Prefs.getFormat(this),q=Prefs.getQuality(this);
              NotificationManager nm=getSystemService(NotificationManager.class);
              nm.createNotificationChannel(new NotificationChannel(CH,"Descargas",NotificationManager.IMPORTANCE_LOW));
              startForeground(1,new NotificationCompat.Builder(this,CH)
                .setContentTitle("Descargando...").setContentText(title)
                .setSmallIcon(android.R.drawable.stat_sys_download).build());
              new Thread(()->{
                try{
                  File dir=new File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_MUSIC),"YTubeDown");
                  if(!dir.exists())dir.mkdirs();
                  YoutubeDLRequest req=new YoutubeDLRequest(url);
                  req.addOption("-o",dir.getAbsolutePath()+"/%(title)s.%(ext)s");
                  if(fmt.equals("audio")){
                    req.addOption("-x");req.addOption("--audio-format","mp3");
                    req.addOption("--audio-quality",q+"K");
                    req.addOption("--embed-thumbnail");req.addOption("--add-metadata");
                  }else{
                    req.addOption("-f","bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]");
                    req.addOption("--merge-output-format","mp4");
                  }
                  YoutubeDL.getInstance().execute(req,null);
                  toast("Descarga completa: "+title);
                }catch(Exception e){toast("Error: "+e.getMessage());}finally{stopSelf();}
              }).start();
              return START_NOT_STICKY;
            }
            private void toast(String m){new Handler(Looper.getMainLooper()).post(()->Toast.makeText(this,m,Toast.LENGTH_LONG).show());}
            @Override public IBinder onBind(Intent i){return null;}
          }
          JEOF


name: Build YTubeDown APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create project structure
        run: |
          mkdir -p app/src/main/java/com/ytubedown
          mkdir -p app/src/main/res/{layout,values,drawable}
          mkdir -p gradle/wrapper

      - name: Write icons
        run: |
          python3 << 'PYEOF'
          import base64, os

          icons = {
            'mipmap-mdpi':    'iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAIAAADYYG7QAAAAmklEQVR4nO3RwQ3AMAhD0QyX/VdqF0gTIMZYFV/c/STG6Eg9cxbPW07FwZCFKSksiAZmAmpuTXDKFStVEzFpgQgah4mmMZnImrNJC1Si2ZkatAUVatamBjXoX6ByjaJJ+2UNahAAVGtaaBpkAFWZPjWKIL7poCGbTBqayaFRBGWb3Jo8VpySYQJogCaY5p6Fp8Rk6Y49sXI+rxcxsw2DEHZ9NAAAAABJRU5ErkJggg==',
            'mipmap-hdpi':    '',
            'mipmap-xhdpi':   '',
            'mipmap-xxhdpi':  '',
            'mipmap-xxxhdpi': '',
          }

          for density, b64 in icons.items():
              d = base64.b64decode(b64)
              path = f'app/src/main/res/{density}'
              os.makedirs(path, exist_ok=True)
              open(f'{path}/ic_launcher.png', 'wb').write(d)
              open(f'{path}/ic_launcher_round.png', 'wb').write(d)
          PYEOF

      - name: Write gradle wrapper
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'GEOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          GEOF

      - name: Download gradlew
        run: |
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
          chmod +x gradlew
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Write gradle.properties
        run: |
          cat > gradle.properties << 'GPEOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          GPEOF

      - name: Write build files
        run: |
          cat > build.gradle << 'BEOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          BEOF

          cat > settings.gradle << 'SEOF'
          rootProject.name = "YTubeDown"
          include ':app'
          SEOF

          cat > app/build.gradle << 'ABEOF'
          plugins { id 'com.android.application' }
          android {
            namespace 'com.ytubedown'
            compileSdk 34
            defaultConfig {
              applicationId "com.ytubedown"
              minSdk 26; targetSdk 34
              versionCode 1; versionName "1.0"
            }
            compileOptions {
              sourceCompatibility JavaVersion.VERSION_17
              targetCompatibility JavaVersion.VERSION_17
            }
            buildFeatures { viewBinding true }
          }
          dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
            implementation 'androidx.recyclerview:recyclerview:1.3.2'
            implementation 'com.squareup.okhttp3:okhttp:4.12.0'
            implementation 'com.google.code.gson:gson:2.10.1'
            implementation 'com.github.bumptech.glide:glide:4.16.0'
            implementation 'io.github.junkfood02.youtubedl-android:library:0.17.2'
            implementation 'io.github.junkfood02.youtubedl-android:ffmpeg:0.17.2'
          }
          ABEOF

      - name: Write AndroidManifest
        run: |
          cat > app/src/main/AndroidManifest.xml << 'MEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
            <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
            <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
            <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
            <application android:allowBackup="true" android:icon="@mipmap/ic_launcher"
              android:label="YTubeDown" android:roundIcon="@mipmap/ic_launcher_round"
              android:supportsRtl="true" android:theme="@style/Theme.YTubeDown">
              <activity android:name=".MainActivity" android:exported="true"
                android:windowSoftInputMode="adjustResize">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                </intent-filter>
              </activity>
              <activity android:name=".SettingsActivity" android:exported="false" />
              <service android:name=".DownloadService" android:exported="false"
                android:foregroundServiceType="dataSync" />
            </application>
          </manifest>
          MEOF


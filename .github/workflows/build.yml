          package com.ytubedown;
          import android.content.Intent;import android.os.Bundle;
          import android.view.inputmethod.*;import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.recyclerview.widget.*;
          import com.yausername.youtubedl_android.*;
          import java.util.*;
          public class MainActivity extends AppCompatActivity{
            private EditText etSearch;
            private RecyclerView rv;
            private ProgressBar pb;
            private LinearLayout empty;
            private final List<VideoItem> list=new ArrayList<>();
            private final YouTubeSearch yt=new YouTubeSearch();
            @Override protected void onCreate(Bundle b){
              super.onCreate(b);setContentView(R.layout.activity_main);
              try{YoutubeDL.getInstance().init(this);}catch(YoutubeDLException e){}
              new Thread(()->{try{YoutubeDL.getInstance().updateYoutubeDL(this,YoutubeDL.UpdateChannel.STABLE);}catch(Exception e){}}). start();
              etSearch=findViewById(R.id.etSearch);
              rv=findViewById(R.id.recyclerView);
              pb=findViewById(R.id.progressBar);
              empty=findViewById(R.id.emptyState);
              rv.setLayoutManager(new LinearLayoutManager(this));
              rv.setAdapter(new VideoAdapter(list,this::dl));
              etSearch.setOnEditorActionListener((v,a,e)->{if(a==EditorInfo.IME_ACTION_SEARCH){search();return true;}return false;});
              findViewById(R.id.btnSearch).setOnClickListener(v->search());
              findViewById(R.id.btnSettings).setOnClickListener(v->startActivity(new Intent(this,SettingsActivity.class)));
            }
            private void search(){
              String q=etSearch.getText().toString().trim();
              if(q.isEmpty())return;
              ((InputMethodManager)getSystemService(INPUT_METHOD_SERVICE)).hideSoftInputFromWindow(etSearch.getWindowToken(),0);
              pb.setVisibility(android.view.View.VISIBLE);
              empty.setVisibility(android.view.View.GONE);
              rv.setVisibility(android.view.View.GONE);
              yt.search(q,new YouTubeSearch.Callback(){
                public void onResults(List<VideoItem> r){
                  runOnUiThread(()->{
                    pb.setVisibility(android.view.View.GONE);
                    list.clear();list.addAll(r);
                    ((VideoAdapter)rv.getAdapter()).notifyDataSetChanged();
                    rv.setVisibility(android.view.View.VISIBLE);
                    if(r.isEmpty())empty.setVisibility(android.view.View.VISIBLE);
                  });
                }
                public void onError(String m){
                  runOnUiThread(()->{
                    pb.setVisibility(android.view.View.GONE);
                    empty.setVisibility(android.view.View.VISIBLE);
                    Toast.makeText(MainActivity.this,m,Toast.LENGTH_LONG).show();
                  });
                }
              });
            }
            private void dl(VideoItem it){
              Toast.makeText(this,"Descargando: "+it.title,Toast.LENGTH_SHORT).show();
              Intent i=new Intent(this,DownloadService.class);
              i.putExtra(DownloadService.EXTRA_URL,it.url);
              i.putExtra(DownloadService.EXTRA_TITLE,it.title);
              startForegroundService(i);
            }
          }
          JEOF

          cat > $S/SettingsActivity.java << 'JEOF'
          package com.ytubedown;
          import android.os.Bundle;import android.widget.*;
          import androidx.appcompat.app.AppCompatActivity;
          public class SettingsActivity extends AppCompatActivity{
            private RadioButton rbAudio,rbVideo;
            private Spinner sp;
            private final String[] qv={"320","256","192","128"};
            @Override protected void onCreate(Bundle b){
              super.onCreate(b);setContentView(R.layout.activity_settings);
              rbAudio=findViewById(R.id.rbAudio);rbVideo=findViewById(R.id.rbVideo);
              sp=findViewById(R.id.spinnerQuality);
              ArrayAdapter<CharSequence> a=ArrayAdapter.createFromResource(this,R.array.quality_options,android.R.layout.simple_spinner_item);
              a.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
              sp.setAdapter(a);
              String fmt=Prefs.getFormat(this),q=Prefs.getQuality(this);
              if(fmt.equals("video"))rbVideo.setChecked(true);else rbAudio.setChecked(true);
              for(int i=0;i<qv.length;i++)if(qv[i].equals(q)){sp.setSelection(i);break;}
              LinearLayout oa=findViewById(R.id.optAudio),ov=findViewById(R.id.optVideo);
              oa.setOnClickListener(v->{rbAudio.setChecked(true);rbVideo.setChecked(false);});
              ov.setOnClickListener(v->{rbVideo.setChecked(true);rbAudio.setChecked(false);});
              findViewById(R.id.btnSave).setOnClickListener(v->{
                Prefs.save(this,rbAudio.isChecked()?"audio":"video",qv[sp.getSelectedItemPosition()]);
                Toast.makeText(this,"Guardado",Toast.LENGTH_SHORT).show();finish();
              });
              findViewById(R.id.btnBack).setOnClickListener(v->finish());
            }
          }
          JEOF


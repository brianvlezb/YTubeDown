package com.ytubedown;
import android.content.Intent;
import android.os.Bundle;
import android.view.inputmethod.*;
import android.widget.*;
import androidx.appcompat.app.AppCompatActivity;
import androidx.recyclerview.widget.*;
import com.yausername.youtubedl_android.*;
import java.util.*;
public class MainActivity extends AppCompatActivity {
    private EditText etSearch;
    private RecyclerView recyclerView;
    private ProgressBar progressBar;
    private LinearLayout emptyState;
    private final List<VideoItem> videoList = new ArrayList<>();
    private final YouTubeSearch youTubeSearch = new YouTubeSearch();
    @Override protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_main);
        try { YoutubeDL.getInstance().init(this); } catch (YoutubeDLException e) {}
        new Thread(() -> { try { YoutubeDL.getInstance().updateYoutubeDL(this, YoutubeDL.UpdateChannel.STABLE); } catch (Exception ignored) {} }).start();
        etSearch = findViewById(R.id.etSearch);
        recyclerView = findViewById(R.id.recyclerView);
        progressBar = findViewById(R.id.progressBar);
        emptyState = findViewById(R.id.emptyState);
        recyclerView.setLayoutManager(new LinearLayoutManager(this));
        recyclerView.setAdapter(new VideoAdapter(videoList, this::onDownload));
        etSearch.setOnEditorActionListener((v,a,e) -> { if(a==EditorInfo.IME_ACTION_SEARCH){doSearch();return true;} return false; });
        findViewById(R.id.btnSearch).setOnClickListener(v -> doSearch());
        findViewById(R.id.btnSettings).setOnClickListener(v -> startActivity(new Intent(this, SettingsActivity.class)));
    }
    private void doSearch() {
        String q = etSearch.getText().toString().trim();
        if (q.isEmpty()) return;
        ((InputMethodManager)getSystemService(INPUT_METHOD_SERVICE)).hideSoftInputFromWindow(etSearch.getWindowToken(),0);
        progressBar.setVisibility(android.view.View.VISIBLE);
        emptyState.setVisibility(android.view.View.GONE);
        recyclerView.setVisibility(android.view.View.GONE);
        youTubeSearch.search(q, new YouTubeSearch.Callback() {
            public void onResults(List<VideoItem> items) {
                runOnUiThread(() -> {
                    progressBar.setVisibility(android.view.View.GONE);
                    videoList.clear(); videoList.addAll(items);
                    ((VideoAdapter)recyclerView.getAdapter()).notifyDataSetChanged();
                    recyclerView.setVisibility(android.view.View.VISIBLE);
                    if (items.isEmpty()) emptyState.setVisibility(android.view.View.VISIBLE);
                });
            }
            public void onError(String msg) {
                runOnUiThread(() -> { progressBar.setVisibility(android.view.View.GONE);
                    emptyState.setVisibility(android.view.View.VISIBLE);
                    Toast.makeText(MainActivity.this,msg,Toast.LENGTH_LONG).show(); });
            }
        });
    }
    private void onDownload(VideoItem item) {
        Toast.makeText(this,"⬇️ " + item.title, Toast.LENGTH_SHORT).show();
        Intent i = new Intent(this, DownloadService.class);
        i.putExtra(DownloadService.EXTRA_URL, item.url);
        i.putExtra(DownloadService.EXTRA_TITLE, item.title);
        startForegroundService(i);
    }
}

name: Build YTubeDown APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Create project structure
        run: |
          mkdir -p app/src/main/{java/com/ytubedown,res/{layout,values,drawable,mipmap-hdpi,mipmap-mdpi,mipmap-xhdpi,mipmap-xxhdpi,mipmap-xxxhdpi}}
          mkdir -p .github/workflows
          mkdir -p gradle/wrapper

      # ── ICONS ──────────────────────────────────────────────────────────────
      - name: Write icons
        run: |
          echo "iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAIAAADYYG7QAAAAmklEQVR4nO3RwQ3AMAhD0QyX/VdqF0gTIMZYFV/c/STG6Eg9cxbPW07FwZCFKSksiAZmAmpuTXDKFStVEzFpgQgah4mmMZnImrNJC1Si2ZkatAUVatamBjXoX6ByjaJJ+2UNahAAVGtaaBpkAFWZPjWKIL7poCGbTBqayaFRBGWb3Jo8VpySYQJogCaY5p6Fp8Rk6Y49sXI+rxcxsw2DEHZ9NAAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp app/src/main/res/mipmap-mdpi/ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp app/src/main/res/mipmap-hdpi/ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          echo "" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xhdpi/ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxhdpi/ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          echo "" | base64 -d > app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          cp app/src/main/res/mipmap-xxxhdpi/ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      # ── GRADLE WRAPPER ─────────────────────────────────────────────────────
      - name: Write gradle wrapper
        run: |
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
EOF

      - name: Download gradlew
        run: |
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew -o gradlew
          chmod +x gradlew

      # ── ROOT BUILD FILES ───────────────────────────────────────────────────
      - name: Write root build.gradle
        run: |
          cat > build.gradle << 'EOF'
buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
}
allprojects { repositories { google(); mavenCentral() } }
task clean(type: Delete) { delete rootProject.buildDir }
EOF

      - name: Write settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
rootProject.name = "YTubeDown"
include ':app'
EOF

      # ── APP BUILD.GRADLE ───────────────────────────────────────────────────
      - name: Write app/build.gradle
        run: |
          cat > app/build.gradle << 'EOF'
plugins { id 'com.android.application' }
android {
    namespace 'com.ytubedown'
    compileSdk 34
    defaultConfig {
        applicationId "com.ytubedown"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
    buildTypes {
        debug { debuggable true }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    buildFeatures { viewBinding true }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'
    implementation 'com.google.code.gson:gson:2.10.1'
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    implementation 'io.github.junkfood02.youtubedl-android:library:0.17.2'
    implementation 'io.github.junkfood02.youtubedl-android:ffmpeg:0.17.2'
}
EOF


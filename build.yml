package com.ytubedown;
import android.content.Context;
import android.content.SharedPreferences;
public class Prefs {
    private static final String NAME = "ytubedown_prefs";
    public static SharedPreferences get(Context ctx) { return ctx.getSharedPreferences(NAME, Context.MODE_PRIVATE); }
    public static String getFormat(Context ctx) { return get(ctx).getString("format", "audio"); }
    public static String getQuality(Context ctx) { return get(ctx).getString("quality", "320"); }
    public static void save(Context ctx, String format, String quality) {
        get(ctx).edit().putString("format", format).putString("quality", quality).apply();
    }
}
EOF

          cat > $SRC/YouTubeSearch.java << 'EOF'
package com.ytubedown;
import com.google.gson.*;
import java.io.IOException;
import java.util.*;
import okhttp3.*;
public class YouTubeSearch {
    private static final String PIPED_API = "https://pipedapi.kavin.rocks";
    private final OkHttpClient client = new OkHttpClient();
    public interface Callback { void onResults(List<VideoItem> items); void onError(String message); }
    public void search(String query, Callback callback) {
        new Thread(() -> {
            try {
                String url = PIPED_API + "/search?q=" + java.net.URLEncoder.encode(query, "UTF-8") + "&filter=videos";
                Request request = new Request.Builder().url(url).header("User-Agent","YTubeDown/1.0").build();
                try (Response response = client.newCall(request).execute()) {
                    if (!response.isSuccessful()) { callback.onError("Error: " + response.code()); return; }
                    callback.onResults(parseResults(response.body().string()));
                }
            } catch (IOException e) { callback.onError("Error: " + e.getMessage()); }
        }).start();
    }
    private List<VideoItem> parseResults(String json) {
        List<VideoItem> list = new ArrayList<>();
        try {
            JsonArray items = JsonParser.parseString(json).getAsJsonObject().getAsJsonArray("items");
            for (JsonElement el : items) {
                JsonObject obj = el.getAsJsonObject();
                if (!obj.has("type") || !obj.get("type").getAsString().equals("stream")) continue;
                String id = "";
                if (obj.has("url")) { String u = obj.get("url").getAsString(); if (u.contains("v=")) id = u.substring(u.indexOf("v=") + 2); }
                String title = obj.has("title") ? obj.get("title").getAsString() : "Sin título";
                String channel = obj.has("uploaderName") ? obj.get("uploaderName").getAsString() : "";
                String thumbnail = obj.has("thumbnail") ? obj.get("thumbnail").getAsString() : "";
                int d = obj.has("duration") ? obj.get("duration").getAsInt() : 0;
                String dur = d > 0 ? (d>=3600 ? String.format("%d:%02d:%02d",d/3600,(d%3600)/60,d%60) : String.format("%d:%02d",d/60,d%60)) : "";
                if (!id.isEmpty()) list.add(new VideoItem(id, title, channel, dur, thumbnail));
                if (list.size() >= 20) break;
            }
        } catch (Exception e) { e.printStackTrace(); }
        return list;
    }
}
EOF

          cat > $SRC/VideoAdapter.java << 'EOF'
package com.ytubedown;
import android.view.*;
import android.widget.*;
import androidx.annotation.NonNull;
import androidx.recyclerview.widget.*;
import com.bumptech.glide.Glide;
import java.util.List;
public class VideoAdapter extends RecyclerView.Adapter<VideoAdapter.VH> {
    public interface OnDownloadClick { void onClick(VideoItem item); }
    private final List<VideoItem> items;
    private final OnDownloadClick listener;
    public VideoAdapter(List<VideoItem> items, OnDownloadClick listener) { this.items = items; this.listener = listener; }
    @NonNull @Override
    public VH onCreateViewHolder(@NonNull ViewGroup parent, int viewType) {
        return new VH(LayoutInflater.from(parent.getContext()).inflate(R.layout.item_video, parent, false));
    }
    @Override public void onBindViewHolder(@NonNull VH h, int pos) {
        VideoItem item = items.get(pos);
        h.title.setText(item.title); h.channel.setText(item.channel); h.duration.setText(item.duration);
        Glide.with(h.thumbnail.getContext()).load(item.thumbnailUrl).centerCrop().into(h.thumbnail);
        h.btnDownload.setOnClickListener(v -> listener.onClick(item));
    }
    @Override public int getItemCount() { return items.size(); }
    static class VH extends RecyclerView.ViewHolder {
        ImageView thumbnail; TextView title, channel, duration; ImageButton btnDownload;
        VH(View v) { super(v); thumbnail=v.findViewById(R.id.imgThumbnail); title=v.findViewById(R.id.tvTitle);
            channel=v.findViewById(R.id.tvChannel); duration=v.findViewById(R.id.tvDuration);
            btnDownload=v.findViewById(R.id.btnDownload); }
    }
}
EOF

          cat > $SRC/DownloadService.java << 'EOF'
package com.ytubedown;
import android.app.*;
import android.content.Intent;
import android.os.*;
import android.widget.Toast;
import androidx.core.app.NotificationCompat;
import com.yausername.youtubedl_android.*;
import java.io.File;
public class DownloadService extends Service {
    public static final String EXTRA_URL = "url", EXTRA_TITLE = "title";
    private static final String CH = "dl_ch";
    @Override public int onStartCommand(Intent intent, int flags, int startId) {
        String url = intent.getStringExtra(EXTRA_URL), title = intent.getStringExtra(EXTRA_TITLE);
        String format = Prefs.getFormat(this), quality = Prefs.getQuality(this);
        NotificationManager nm = getSystemService(NotificationManager.class);
        nm.createNotificationChannel(new NotificationChannel(CH, "Descargas", NotificationManager.IMPORTANCE_LOW));
        startForeground(1, new NotificationCompat.Builder(this, CH)
            .setContentTitle("Descargando...").setContentText(title)
            .setSmallIcon(android.R.drawable.stat_sys_download).build());
        new Thread(() -> {
            try {
                File outDir = new File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_MUSIC), "YTubeDown");
                if (!outDir.exists()) outDir.mkdirs();
                YoutubeDLRequest req = new YoutubeDLRequest(url);
                req.addOption("-o", outDir.getAbsolutePath() + "/%(title)s.%(ext)s");
                if (format.equals("audio")) {
                    req.addOption("-x"); req.addOption("--audio-format","mp3");
                    req.addOption("--audio-quality", quality + "K");
                    req.addOption("--embed-thumbnail"); req.addOption("--add-metadata");
                } else {
                    req.addOption("-f","bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]");
                    req.addOption("--merge-output-format","mp4");
                }
                YoutubeDL.getInstance().execute(req, null);
                toast("✅ " + title);
            } catch (Exception e) { toast("❌ " + e.getMessage()); } finally { stopSelf(); }
        }).start();
        return START_NOT_STICKY;
    }
    private void toast(String msg) { new Handler(Looper.getMainLooper()).post(() -> Toast.makeText(this,msg,Toast.LENGTH_LONG).show()); }
    @Override public IBinder onBind(Intent i) { return null; }
}

package com.ytubedown;
import android.os.Bundle;
import android.widget.*;
import androidx.appcompat.app.AppCompatActivity;
public class SettingsActivity extends AppCompatActivity {
    private RadioButton rbAudio, rbVideo;
    private Spinner spinnerQuality;
    private final String[] qualityValues = {"320","256","192","128"};
    @Override protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        setContentView(R.layout.activity_settings);
        rbAudio = findViewById(R.id.rbAudio); rbVideo = findViewById(R.id.rbVideo);
        spinnerQuality = findViewById(R.id.spinnerQuality);
        ArrayAdapter<CharSequence> adapter = ArrayAdapter.createFromResource(this, R.array.quality_options, android.R.layout.simple_spinner_item);
        adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);
        spinnerQuality.setAdapter(adapter);
        String fmt = Prefs.getFormat(this), q = Prefs.getQuality(this);
        if (fmt.equals("video")) rbVideo.setChecked(true); else rbAudio.setChecked(true);
        for (int i=0;i<qualityValues.length;i++) if (qualityValues[i].equals(q)) { spinnerQuality.setSelection(i); break; }
        LinearLayout optAudio = findViewById(R.id.optAudio), optVideo = findViewById(R.id.optVideo);
        optAudio.setOnClickListener(v -> { rbAudio.setChecked(true); rbVideo.setChecked(false); });
        optVideo.setOnClickListener(v -> { rbVideo.setChecked(true); rbAudio.setChecked(false); });
        findViewById(R.id.btnSave).setOnClickListener(v -> {
            Prefs.save(this, rbAudio.isChecked()?"audio":"video", qualityValues[spinnerQuality.getSelectedItemPosition()]);
            Toast.makeText(this,"✅ Guardado",Toast.LENGTH_SHORT).show(); finish();
        });
        findViewById(R.id.btnBack).setOnClickListener(v -> finish());
    }
}
